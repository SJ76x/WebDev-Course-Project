<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z.com</title>

  <link rel="stylesheet" href="../styles/global.css">
</head>

<body id="feedBody">

  <!-- ===== NAVBAR ===== -->
  <header id="feedHeader">
    <h1 id="feedTitle">Home</h1>
    <nav class="feedNav">
              <ul>
        <a href="feed.html"><li><img src="../images/home.png" alt="">Home</li></a>
        <a href="profile.html"><li><img src="../images/user.png" alt="">Profile</li></a>
        <a href="login.html" id="logoutBtn"><li><img src="../images/sign-out-alt.png" alt="">Logout</li></a>
      </ul>
    </nav>
  </header>

  <!-- ===== MAIN ===== -->
  <main id="feedMain">

    <!-- CREATE POST -->
    <section class="create-post">
      <img src="../images/default-avatar.jpeg" alt="Profile Picture" class="post-avatar">
      <input type="text" id="postInput" placeholder="Write something..?">
      <button class="tweet-button" id="postBtn">Post</button>
    </section>

    <!-- POSTS -->
    <section id="feed"></section>

  </main>

  <script type="module" src="../logic/feed.js"></script>

</html>
