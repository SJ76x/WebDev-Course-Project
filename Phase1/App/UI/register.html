<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="../styles/global.css" />
</head>
<body>
    <main>
        <h1>Register</h1>
        <form class = "regForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <div class="error" id="username-error"></div>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <div class="error" id="email-error"></div>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required minlength="8">
            <div class="error" id="password-error"></div>

            <label for="confirmPassword">Confirm Password:</label>
            <input type="confirmPassword" id="confirmPassword" name="confirmPassword" required>
            <div class="error" id="confirmPassword-error"></div>
            
            <button class="button" type="submit" >Register</button>
        </form>
        <div id="login-Register-PageReference">
            <p >already have an account? <a href="login.html">Login</a></p>
        </div>
        
    </main>
    <script type="module" src="../logic/register.js"></script>
</body>
</html>
